; PlatformIO Project Configuration File
; Distributed Cuckoo Filter System
; 
; Two environments:
; - esp32dev: Slave node (default)
; - esp32dev_master: Master node

[platformio]
default_envs = esp32dev

; Common settings for all ESP32 environments
[env]
platform = espressif32 @ 5.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    links2004/WebSockets @ ^2.3.7
    bblanchon/ArduinoJson @ ^6.21.0

; SLAVE NODE - Connects to master via WebSocket client
[env:esp32dev]
build_src_filter = 
    +<*.cpp>
    +<cuckoo_filter/*.cpp>
    +<websocket/*.cpp>
build_flags = 
    -D NODE_TYPE=SLAVE
    -D NODE_ID=1

; MASTER NODE - Runs WebSocket server, coordinates slaves
[env:esp32dev_master]
build_src_filter = 
    +<master/main_master.cpp>
    +<cuckoo_filter/*.cpp>
    +<websocket/*.cpp>
build_flags = 
    -D NODE_TYPE=MASTER
    -D NODE_ID=0
